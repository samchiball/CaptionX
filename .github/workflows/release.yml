name: Release

# v* 태그를 푸시하거나 수동으로 실행하면 3개 OS에서 빌드해 GitHub Release에 산출물을 올린다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '릴리즈 태그 (예: v1.0.0)'
        required: true
        type: string
      draft:
        description: '초안(Draft)으로 생성할지 여부'
        required: false
        type: boolean
        default: false

permissions:
  contents: write # Release 생성/업로드에 필요

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest # win x64 → nsis
            pack: pack:win
          - os: macos-14 # Apple Silicon (arm64) → dmg
            pack: pack:mac
          - os: ubuntu-latest # linux x64 → AppImage
            pack: pack:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build & package
        run: npm run ${{ matrix.pack }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 코드 서명: 인증서 시크릿이 설정돼 있으면 사용, 없으면 미서명 빌드.
          # (mac 공증/win 서명을 붙이려면 아래 시크릿을 저장소에 등록한다.)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: ${{ github.event.inputs.draft == 'true' || false }}
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/latest*.yml
          fail_on_unmatched_files: false
