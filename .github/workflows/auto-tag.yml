name: Auto Tag on Version Bump

# main에 push될 때 package.json 버전이 "최신 릴리즈"보다 높으면 태그를 만들어 푸시한다.
# 태그 push는 release.yml을 트리거해 빌드·릴리즈 배포로 이어진다.
# (단순히 태그 존재 여부가 아니라, 최신 릴리즈 대비 버전이 올라간 경우에만 동작한다.)
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version from package.json
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest release version
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 최신 릴리즈 태그를 조회한다. 릴리즈가 하나도 없으면 0.0.0 으로 간주.
          LATEST=$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
            echo "No existing release found. Treating latest as $LATEST."
          fi
          # 선행 'v' 제거
          echo "version=${LATEST#v}" >> $GITHUB_OUTPUT

      - name: Compare versions (semver)
        id: compare
        run: |
          CURRENT="${{ steps.get_version.outputs.version }}"
          LATEST="${{ steps.latest_release.outputs.version }}"
          # semver 비교: CURRENT > LATEST 일 때만 higher=true
          HIGHER=$(node -e "
            const a = process.argv[1].split('.').map(Number);
            const b = process.argv[2].split('.').map(Number);
            let res = false;
            for (let i = 0; i < 3; i++) {
              if ((a[i] || 0) > (b[i] || 0)) { res = true; break; }
              if ((a[i] || 0) < (b[i] || 0)) { res = false; break; }
            }
            console.log(res ? 'true' : 'false');
          " "$CURRENT" "$LATEST")
          echo "higher=$HIGHER" >> $GITHUB_OUTPUT
          echo "package=$CURRENT, latest release=$LATEST, higher=$HIGHER"

      - name: Create and push tag
        if: steps.compare.outputs.higher == 'true'
        run: |
          TAG_NAME="${{ steps.get_version.outputs.tag }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
