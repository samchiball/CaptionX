# Lefthook 설정 — Git 훅 자동 관리
# 설치: npx lefthook install (prepare 에서 자동 실행됨)
# 참고: https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: npx biome check --no-errors-on-unmatched {staged_files}

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: npm run typecheck
    - name: test
      run: npm run test
